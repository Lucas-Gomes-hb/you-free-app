name: youfree
description: YouFree - Listen to YouTube without ads
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State Management
  mobx: ^2.3.3
  flutter_mobx: ^2.2.1
  
  # HTTP Client
  dio: ^5.4.0
  
  # Audio Player
  just_audio: ^0.9.36
  audio_service: ^0.18.18

  # Video Player
  video_player: ^2.9.1
  
  # Navigation
  go_router: ^13.2.0
  
  # Utils
  cached_network_image: ^3.3.1
  shared_preferences: ^2.3.0
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  mobx_codegen: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/youfree.png